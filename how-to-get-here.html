<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Casa Sasa</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
    <style>
      /* Inline critical CSS to hide content before auth check */
      body:not(.auth-verified) { opacity: 0; }
    </style>
  </head>

  <body>
    <div class="main-container">
      <div class="header">
        <div class="header-actions"></div>
        <div class="header-content">
          <a href="/" style="text-decoration:none;color:inherit;">
            <h1>CASA SASA</h1>
          </a>
        </div>
        <div class="header-actions"></div>
      </div>
      <div class="tricolore">
        <div class="tricolore-green"></div>
        <div class="tricolore-white"></div>
        <div class="tricolore-red"></div>
      </div>
      <nav id="navigation">
        <script type="module" src="/src/main.js"></script>
      </nav>
      <div id="content-container">
        <section id="welcome-box">
          <h2 data-i18n="howToGetHere.title"></h2>
          <hr class="section-divider">
        </section>
        <section class="features-grid">
          <section class="box">
            <h3 data-i18n="howToGetHere.byCar"></h3>
            <p data-i18n="howToGetHere.carDescription" style="margin:0 0 12px;font-size:14px;line-height:1.6"></p>
          </section>
          <section class="box">
            <h3 data-i18n="howToGetHere.byTrain"></h3>
            <p data-i18n="howToGetHere.trainDescription" style="margin:0 0 12px;font-size:14px;line-height:1.6"></p>
          </section>
        </section>

        <div style="padding: 0 26px 22px;">
          <h2 data-i18n="howToGetHere.parking" style="font-family:Georgia,serif;color:#0b5c34;font-size:20px;margin:20px 0 8px;font-weight:bold;">Parking</h2>
          <hr class="section-divider">
          <div class="box" style="margin-bottom: 20px;">
            <ul style="margin:0;padding-left:22px;font-size:14px;line-height:1.7;">
              <li data-i18n-html="howToGetHere.parkingBestWithLink"></li>
              <li data-i18n-html="howToGetHere.parkingLimited"></li>
              <li data-i18n-html="howToGetHere.parkingGeneral"></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
