<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Casa Sasa</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
    <style>
      /* Inline critical CSS to hide content before auth check */
      body:not(.auth-verified) { opacity: 0; }
    </style>
  </head>

  <body>
    <div class="main-container">
      <div class="header">
        <div class="header-actions"></div>
        <div class="header-content">
          <a href="/" style="text-decoration:none;color:inherit;">
            <h1>CASA SASA</h1>
          </a>
        </div>
        <div class="header-actions"></div>
      </div>
      <div class="tricolore">
        <div class="tricolore-green"></div>
        <div class="tricolore-white"></div>
        <div class="tricolore-red"></div>
      </div>
      <nav id="navigation">
        <script type="module" src="/src/main.js"></script>
      </nav>
      <div id="content-container">
        <div style="padding: 22px 26px;">
          <h1 class="section-header" data-i18n="gallery.title">Photo Gallery</h1>
          <hr class="section-divider">
        </div>
        <div class="gallery-grid">
        </div>
        <div class="form-container" id="upload-section" style="display:none;">
          <h3 data-i18n="gallery.uploadTitle">Upload a New Photo</h3>
          <form id="upload-form">
            <div class="form-group">
              <label for="file-input" data-i18n="gallery.uploadLabel">Select Image:</label>
              <input type="file" id="file-input" name="photo" accept="image/*" required />
            </div>
            <button type="submit" class="btn-submit" data-i18n="gallery.uploadButton">Upload Photo</button>
          </form>
        </div>
      </div>
    </div>
    <div id="image-modal" class="modal">
      <span class="close-modal">&times;</span>
      <span class="prev-modal">&#10094;</span>
      <span class="next-modal">&#10095;</span>
      <img class="modal-content" id="enlarged-image" alt="Enlarged view">
    </div>
  </body>
</html>
