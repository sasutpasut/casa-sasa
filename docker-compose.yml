version: '3.8'

services:
  frontend:
    build: .
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certificates
      # For Cloudflare Origin certificates:
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare
    restart: always
    depends_on:
      - backend
    networks:
      - casa-sasa-network

  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && node server.js"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
    volumes:
      - ./backend:/app
      - casa-sasa-data:/app/data
      - casa-sasa-uploads:/app/uploads
    restart: always
    networks:
      - casa-sasa-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/trips"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  casa-sasa-network:
    driver: bridge

volumes:
  casa-sasa-data:
    driver: local
  casa-sasa-uploads:
    driver: local