version: '3.8'

services:
frontend:
    build: .
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

  backend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && node server.js"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - gallery-photos:/app/uploads # This keeps photos safe on the server host
    restart: always

volumes:
  gallery-photos: # Declares the persistent volume