# HTTP server - redirect to HTTPS
server {
    listen 80;
    server_name sasa.casa www.sasa.casa;

    # Increase upload size limit
    client_max_body_size 100M;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name sasa.casa www.sasa.casa;

    # SSL certificates (Cloudflare Origin)
    ssl_certificate /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Increase upload size limit for photo uploads (100MB)
    client_max_body_size 100M;

    root /usr/share/nginx/html;
    index index.html;

    # Enable clean URLs - rewrite requests without .html to include .html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Specific routes for clean URLs
    location = / {
        try_files /index.html =404;
    }

    location = /how-to-get-here {
        try_files /how-to-get-here.html =404;
    }

    location = /instructions {
        try_files /instructions.html =404;
    }

    location = /trips {
        try_files /trips.html =404;
    }

    location = /map {
        try_files /map.html =404;
    }

    location = /gallery {
        try_files /gallery.html =404;
    }

    location = /login {
        try_files /login.html =404;
    }

    # Proxy API requests to backend
    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle static assets
    location /src {
        try_files $uri =404;
    }

    location /uploads {
        proxy_pass http://backend:3000/uploads;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
}
